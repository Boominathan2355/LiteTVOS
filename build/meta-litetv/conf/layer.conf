# meta-litetv — LiteTV OS Yocto layer
BBPATH .= ":${LAYERDIR}"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "litetv"
BBFILE_PATTERN_litetv = "^${LAYERDIR}/"
BBFILE_PRIORITY_litetv = "10"

LAYERDEPENDS_litetv = "core"
LAYERSERIES_COMPAT_litetv = "nanbield scarthgap styhead"
