# LiteTV OS distro — lean Wayland appliance (no X11, minimal init).
# Targets: image < 2.5 GB, RAM <= 512 MB (see docs/06, docs/13).
require conf/distro/poky.conf

DISTRO = "litetv"
DISTRO_NAME = "LiteTV OS"
DISTRO_VERSION = "0.1.0"
DISTRO_CODENAME = "aurora"
MAINTAINER = "LiteTV OS"

# Wayland-only graphics; drop X11 and other bulk.
DISTRO_FEATURES:append = " wayland opengl"
DISTRO_FEATURES:remove = "x11 wayland-x11 nfs"

# Small, fast init. (Switch to systemd only if a feature needs it.)
INIT_MANAGER = "sysvinit"
VIRTUAL-RUNTIME_init_manager = "busybox"

# Size discipline.
DISTRO_FEATURES:remove = "ptest"
INHERIT += "rm_work"
