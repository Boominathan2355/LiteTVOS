#@TYPE: Machine
#@NAME: litetv-qemuarm64
#@DESCRIPTION: LiteTV OS reference QEMU aarch64 target (virtual-first bring-up).
require conf/machine/qemuarm64.conf

# Headless-capable virtio-gpu; KMS/DRM path matches the real overlay-plane model.
XSERVER = ""
PREFERRED_PROVIDER_virtual/libgl ?= "mesa"
MACHINE_FEATURES:append = " vfat"

# Give QEMU enough RAM to validate the 512 MB budget with headroom.
QB_MEM = "-m 1024"
QB_GRAPHICS = "-device virtio-gpu-pci"
QB_AUDIO_DRV = "none"
