<!doctype html>
<html lang="en" data-au-motion="auto">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aurora UI · LiteTV OS</title>
    <link rel="stylesheet" href="tokens.css" />
    <style>
      html, body { height: 100%; }
      body {
        margin: 0; background: var(--au-bg); color: var(--au-text);
        font-family: var(--au-font);
        padding: var(--au-space-5) clamp(16px, 4vw, 56px) var(--au-space-6);
        box-sizing: border-box;
      }
      header { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
      h1 { font: var(--au-display); font-size: 34px; margin: 0; }
      .tag { color: var(--au-text-2); font: var(--au-body); }
      .specs {
        margin: 10px 0 4px; display: flex; gap: 8px; flex-wrap: wrap;
      }
      .chip {
        font: var(--au-caption); color: var(--au-text);
        background: var(--au-surface-2); border: 1px solid #2c2f36;
        border-radius: 999px; padding: 4px 10px;
      }
      .hint { color: var(--au-text-2); font: var(--au-caption); margin: 6px 0 0; }
      kbd {
        background: var(--au-surface-2); border-radius: 6px; padding: 1px 6px;
        font: var(--au-caption); border: 1px solid #333;
      }
      a { color: var(--au-primary); text-decoration: none; }
      h2 { font: var(--au-heading); font-size: 20px; margin: 22px 0 12px; }
      .row {
        display: flex; gap: var(--au-space-4);
        overflow-x: auto; padding: 18px 6px; scroll-padding-inline: 24px;
      }
      .row::-webkit-scrollbar { height: 0; }
      aurora-card { --au-card-w: 168px; scroll-snap-align: center; }
      #status {
        position: sticky; bottom: 0; margin-top: 12px; padding: 8px 0;
        color: var(--au-text-2); font: var(--au-caption);
        background: linear-gradient(transparent, var(--au-bg) 40%);
      }
      #status b { color: var(--au-text); }
      .src { color: var(--au-text-2); }
    </style>
  </head>
  <body>
    <header>
      <h1>Aurora UI</h1>
      <span class="tag">LiteTV OS — Beautiful Performance</span>
    </header>
    <div class="specs" id="specs"></div>
    <p class="hint">
      <kbd>←</kbd> <kbd>→</kbd> <kbd>↑</kbd> <kbd>↓</kbd> move focus ·
      <kbd>Enter</kbd> select. Focus logic runs server-side in Rust via
      <a href="/api/navigate?row=0&col=0&dir=right"><code>/api/navigate</code></a>.
    </p>

    <main id="rows"></main>
    <div id="status">Loading…</div>

    <script type="module">
      import "./components/aurora-card.js";

      const ACCENTS = ["#3A7AFE", "#EA4335", "#34C759", "#5C6BC0", "#F4B400", "#8E7CFF"];
      const NAMES = ["Aurora Origins","Neon Drift","Quiet Tides","Starfall","Golden Hour",
        "The Long Road","Skyline","Echoes","Midnight Sun","Paper Boats","Lantern","Driftwood"];
      const GENRES = ["Documentary","Action","Drama","Sci-Fi","Romance","Adventure"];

      const rowsEl = document.getElementById("rows");
      const statusEl = document.getElementById("status");
      const specsEl = document.getElementById("specs");

      let home = { rows: [] };
      let focus = { row: 0, col: 0 };
      let backend = true;

      const api = async (path) => {
        const r = await fetch(path);
        if (!r.ok && r.status !== 400) throw new Error(path + " → " + r.status);
        return r.json();
      };

      // Specs chips from /api/specs (graceful if offline).
      try {
        const s = await api("/api/specs");
        const chips = [
          ["RAM", `≤ ${s.total_ram_mb_max} MB`],
          ["CPU idle", `< ${s.cpu_idle_pct_max}%`],
          ["Boot", `< ${s.boot_s_max}s`],
          ["Launcher", `< ${s.launcher_start_ms_max}ms`],
          ["Anim", `${s.animation_fps} FPS`],
          ["Image", `< ${s.system_image_gb_max} GB`],
        ];
        specsEl.innerHTML = chips.map(([k, v]) => `<span class="chip">${k} ${v}</span>`).join("");
      } catch { specsEl.remove(); }

      // Home layout from /api/home (fallback to a static row if opened as a file).
      try {
        home = await api("/api/home");
      } catch {
        backend = false;
        home = { rows: [{ index: 0, title: "Continue Watching", items: 6 }] };
      }

      const cardEls = []; // cardEls[row][col]
      home.rows.forEach((row, ri) => {
        const h2 = document.createElement("h2");
        h2.textContent = row.title;
        rowsEl.appendChild(h2);
        const rowDiv = document.createElement("div");
        rowDiv.className = "row";
        const cols = [];
        for (let ci = 0; ci < row.items; ci++) {
          const card = document.createElement("aurora-card");
          card.setAttribute("title", NAMES[(ri * 3 + ci) % NAMES.length]);
          card.setAttribute("subtitle",
            `${1 + ((ri + ci) % 2)}h ${10 + ci * 7 % 50}m · ${GENRES[(ri + ci) % GENRES.length]}`);
          card.setAttribute("accent", ACCENTS[(ri + ci) % ACCENTS.length]);
          card.setAttribute("progress", ((ci * 17 + ri * 11) % 100) / 100);
          card.innerHTML = `
            <button slot="actions" data-action="play" aria-label="Play">▶</button>
            <button slot="actions" data-action="info" aria-label="Info">ⓘ</button>`;
          rowDiv.appendChild(card);
          cols.push(card);
        }
        rowsEl.appendChild(rowDiv);
        cardEls.push(cols);
      });

      const cardAt = (f) => cardEls[f.row]?.[f.col] || null;

      function applyFocus() {
        const el = cardAt(focus);
        if (!el) return;
        el.focus();
        el.scrollIntoView({ inline: "center", block: "nearest", behavior: "smooth" });
        const title = home.rows[focus.row]?.title ?? "";
        statusEl.innerHTML =
          `focus → <b>${title}</b> · row ${focus.row} · col ${focus.col}` +
          (backend ? ` <span class="src">(via Rust /api/navigate)</span>`
                   : ` <span class="src">(offline — local engine)</span>`);
      }

      const DIRS = { ArrowLeft: "left", ArrowRight: "right", ArrowUp: "up", ArrowDown: "down" };

      // Local clamp fallback when no backend (file:// use).
      function localNavigate(dir) {
        const rows = home.rows;
        if (dir === "left") focus.col = Math.max(0, focus.col - 1);
        else if (dir === "right") focus.col = Math.min(rows[focus.row].items - 1, focus.col + 1);
        else if (dir === "up" && focus.row > 0) {
          focus.row--; focus.col = Math.min(focus.col, rows[focus.row].items - 1);
        } else if (dir === "down" && focus.row < rows.length - 1) {
          focus.row++; focus.col = Math.min(focus.col, rows[focus.row].items - 1);
        }
      }

      window.addEventListener("keydown", async (e) => {
        const dir = DIRS[e.key];
        if (!dir) return;
        e.preventDefault();
        if (backend) {
          try {
            const r = await api(`/api/navigate?row=${focus.row}&col=${focus.col}&dir=${dir}`);
            focus = { row: r.row, col: r.col };
          } catch { backend = false; localNavigate(dir); }
        } else {
          localNavigate(dir);
        }
        applyFocus();
      });

      rowsEl.addEventListener("au-select", (e) =>
        (statusEl.innerHTML = `▶ <b>Selected:</b> ${e.detail.title}`));

      applyFocus();
    </script>
  </body>
</html>
