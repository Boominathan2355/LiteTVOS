<!doctype html>
<html lang="en" data-au-motion="auto">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aurora UI · LiteTV OS</title>
    <link rel="stylesheet" href="tokens.css" />
    <style>
      html, body { height: 100%; }
      body {
        margin: 0; background: var(--au-bg); color: var(--au-text);
        font-family: var(--au-font); overflow: hidden;
        display: flex; flex-direction: column;
        padding: var(--au-space-4) clamp(16px, 4vw, 56px) var(--au-space-3);
        box-sizing: border-box;
        transition: background-color var(--au-dur-4) var(--au-ease-out),
                    color var(--au-dur-4) var(--au-ease-out);
      }
      /* Section + sheet entrance — the "smoothness" pass. */
      @keyframes au-enter { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
      @keyframes au-pop   { from { opacity: 0; transform: scale(.96) translateY(8px); } to { opacity: 1; transform: none; } }
      @keyframes au-rise  { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
      main.enter { animation: au-enter var(--au-dur-4) var(--au-ease-out); }
      main.enter h2, main.enter .row, main.enter .grid, main.enter .guide,
      main.enter .setrow, main.enter .chips, main.enter .search-box {
        animation: au-rise var(--au-dur-4) var(--au-ease-out) both;
      }
      main.enter > :nth-child(2) { animation-delay: 40ms; }
      main.enter > :nth-child(3) { animation-delay: 80ms; }
      main.enter > :nth-child(4) { animation-delay: 120ms; }
      main.enter > :nth-child(n+5) { animation-delay: 160ms; }
      :root[data-au-motion="reduced"] main.enter,
      :root[data-au-motion="reduced"] main.enter * ,
      :root[data-au-motion="reduced"] .sheet { animation: none !important; }
      /* top bar */
      .topbar { display: flex; align-items: center; gap: 16px; }
      .brand { font: var(--au-display); font-size: 26px; margin: 0; }
      .brand small { color: var(--au-text-2); font-size: 13px; font-weight: 400; }
      .spacer { flex: 1; }
      .clock { color: var(--au-text-2); font: var(--au-caption); font-size: 14px; }
      /* tabs */
      nav.tabs { display: flex; gap: 8px; margin: 14px 0 4px; }
      .tab {
        font: var(--au-caption); font-size: 15px; color: var(--au-text-2);
        padding: 8px 16px; border-radius: 999px; cursor: pointer; outline: none;
        border: 1px solid transparent; transition: all var(--au-dur-2) var(--au-ease-out);
        white-space: nowrap;
      }
      .tab[aria-selected="true"] { color: var(--au-text); background: var(--au-surface); }
      .tab:focus { color: var(--au-text); border-color: var(--au-primary);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--au-primary) 45%, transparent); }
      /* content */
      main { flex: 1; overflow-y: auto; padding-bottom: 24px; scroll-behavior: smooth; }
      main::-webkit-scrollbar { width: 0; }
      h2 { font: var(--au-heading); font-size: 18px; margin: 18px 0 10px; }
      .row { display: flex; gap: 16px; overflow-x: auto; padding: 16px 4px; }
      .row::-webkit-scrollbar { height: 0; }
      aurora-card { --au-card-w: 158px; }
      /* app grid */
      .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; padding: 12px 4px; }
      .tile {
        background: var(--au-surface); border-radius: var(--au-radius-md);
        aspect-ratio: 1 / 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 10px;
        cursor: pointer; outline: none; border: 1px solid var(--au-border);
        transition: transform var(--au-dur-3) var(--au-ease-spring),
                    box-shadow var(--au-dur-3) var(--au-ease-out);
      }
      .tile .glyph {
        width: 52px; height: 52px; border-radius: 14px; display: grid;
        place-items: center; font-size: 24px; color: #fff; font-weight: 700;
      }
      .tile .name { font: var(--au-caption); font-size: 14px; }
      .tile:focus { transform: scale(1.06);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--au-primary) 70%, transparent),
                    0 12px 32px rgba(0,0,0,.55);
        background: var(--au-surface-2); }
      .tile.input { aspect-ratio: auto; padding: 16px 12px; }
      /* live tv guide */
      .guide { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; padding: 12px 4px; }
      .chcard {
        background: var(--au-surface); border: 1px solid var(--au-border);
        border-left: 4px solid var(--ac, var(--au-primary));
        border-radius: var(--au-radius-md); padding: 14px 16px; outline: none; cursor: pointer;
        transition: transform var(--au-dur-3) var(--au-ease-spring),
                    box-shadow var(--au-dur-3) var(--au-ease-out);
      }
      .chcard:focus { transform: scale(1.03); background: var(--au-surface-2);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--au-primary) 60%, transparent), 0 12px 32px rgba(0,0,0,.5); }
      .chhead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
      .chhead .num { font-weight: 700; color: var(--ac, #fff); }
      .chhead .src { font: var(--au-caption); color: var(--au-text-2); }
      .chname { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
      .chnow, .chnext { font: var(--au-caption); color: var(--au-text-2); margin-top: 2px; }
      .chnow b, .chnext b { color: var(--au-text); margin-right: 6px; }
      /* recordings */
      .reccard { min-width: 220px; }
      .recmeta { font: var(--au-caption); color: var(--au-text-2); margin-top: 6px; }
      .badge {
        font: var(--au-caption); font-size: 12px; font-weight: 700; letter-spacing: .02em;
        border-radius: 999px; padding: 3px 9px; display: inline-flex; align-items: center; gap: 6px;
      }
      .badge.rec      { background: color-mix(in srgb, #EA4335 22%, transparent); color: #ff7a70; }
      .badge.recorded { background: color-mix(in srgb, #34C759 20%, transparent); color: #54d97e; }
      .badge.scheduled{ background: color-mix(in srgb, var(--au-primary) 22%, transparent); color: #7aa6ff; }
      .badge .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
      .badge.rec .dot { animation: blink 1.2s steps(2, start) infinite; }
      @keyframes blink { 50% { opacity: .25; } }
      :root[data-au-motion="reduced"] .badge.rec .dot { animation: none; }
      /* search */
      .search-box {
        width: 100%; box-sizing: border-box; font: var(--au-body);
        background: var(--au-surface); color: var(--au-text);
        border: 1px solid var(--au-border-2); border-radius: var(--au-radius-md);
        padding: 14px 18px; outline: none;
      }
      .search-box:focus { border-color: var(--au-primary);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--au-primary) 40%, transparent); }
      .muted { color: var(--au-text-2); font: var(--au-caption); }
      /* settings */
      .setrow {
        display: flex; align-items: center; justify-content: space-between;
        background: var(--au-surface); border: 1px solid var(--au-border);
        border-radius: var(--au-radius-md); padding: 14px 18px; margin: 10px 0;
        outline: none; cursor: pointer;
      }
      .setrow:focus { border-color: var(--au-primary);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--au-primary) 45%, transparent); }
      .setrow .val { color: var(--au-text-2); }
      .chips { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 16px; }
      .chip { font: var(--au-caption); background: var(--au-surface-2);
        border: 1px solid var(--au-border-2); border-radius: 999px; padding: 4px 10px; }
      /* footer + overlay */
      .status { color: var(--au-text-2); font: var(--au-caption); padding: 6px 2px; min-height: 1.3em; }
      .status b { color: var(--au-text); }
      .overlay {
        position: fixed; inset: 0; background: var(--au-scrim);
        display: flex; align-items: center; justify-content: center; backdrop-filter: blur(6px);
        opacity: 0; visibility: hidden;
        transition: opacity var(--au-dur-3) var(--au-ease-out),
                    visibility 0s linear var(--au-dur-3);
      }
      .overlay.open { opacity: 1; visibility: visible; transition: opacity var(--au-dur-3) var(--au-ease-out); }
      .sheet {
        width: min(560px, 86vw); background: var(--au-surface);
        border: 1px solid var(--au-border-2); border-radius: var(--au-radius-xl);
        padding: 28px; box-shadow: 0 24px 64px rgba(0,0,0,.6);
      }
      .overlay.open .sheet { animation: au-pop var(--au-dur-3) var(--au-ease-spring); }
      :root[data-au-motion="reduced"] .overlay { transition: none; }
      .sheet h3 { font: var(--au-display); font-size: 26px; margin: 0 0 6px; }
      .sheet .meta { color: var(--au-text-2); margin-bottom: 18px; }
      .sheet .bar { height: 6px; background: var(--au-surface-2); border-radius: 4px; overflow: hidden; margin-bottom: 18px; }
      .sheet .bar > i { display: block; height: 100%; background: var(--au-primary); }
      .sheet .btns { display: flex; gap: 12px; }
      .sheet button {
        font: var(--au-body); font-size: 16px; color: #fff; border: 0; cursor: pointer;
        border-radius: var(--au-radius-sm); padding: 12px 22px; outline: none;
        background: var(--au-surface-2);
      }
      .sheet button.play { background: var(--au-primary); }
      .sheet button:focus { box-shadow: 0 0 0 3px color-mix(in srgb, var(--au-primary) 60%, transparent); }
    </style>
  </head>
  <body>
    <div class="topbar">
      <h1 class="brand">Aurora UI <small>· LiteTV OS</small></h1>
      <span class="spacer"></span>
      <span class="clock" id="clock"></span>
    </div>
    <nav class="tabs" id="tabs"></nav>
    <main id="main"></main>
    <div class="status" id="status">↑↓←→ navigate · Enter select · type to search</div>

    <div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>

    <script type="module">
      import "./components/aurora-card.js";

      const $ = (sel) => document.querySelector(sel);
      const tabsEl = $("#tabs"), mainEl = $("#main"), statusEl = $("#status");
      const overlayEl = $("#overlay"), sheetEl = $("#sheet");

      const SECTIONS = [
        { id: "home", label: "Home" },
        { id: "livetv", label: "Live TV" },
        { id: "apps", label: "Apps" },
        { id: "search", label: "Search" },
        { id: "settings", label: "Settings" },
      ];
      const COLS = 6;

      const state = {
        zone: "content",     // "tabs" | "content"
        tab: 0,
        section: "home",
        rows: [],            // Element[][] for the active section
        focus: { r: 0, c: 0 },
        desiredCol: 0,
        onEnter: () => {},
        onInput: null,       // search hook
      };

      const api = async (p) => {
        try { const r = await fetch(p); return r.ok ? await r.json() : null; }
        catch { return null; }
      };
      const setStatus = (html) => (statusEl.innerHTML = html);

      // --- tab bar ---------------------------------------------------------
      const tabEls = SECTIONS.map((s, i) => {
        const t = document.createElement("div");
        t.className = "tab"; t.tabIndex = 0; t.textContent = s.label;
        t.setAttribute("role", "tab");
        t.addEventListener("click", () => selectTab(i, true));
        tabsEl.appendChild(t);
        return t;
      });
      function paintTabs() {
        tabEls.forEach((t, i) => t.setAttribute("aria-selected", String(i === state.tab)));
      }
      function selectTab(i, enter) {
        state.tab = i; paintTabs();
        loadSection(SECTIONS[i].id).then(() => {
          if (enter) { state.zone = "content"; state.focus = { r: 0, c: 0 }; state.desiredCol = 0; applyFocus(); }
        });
      }

      // --- section builders ------------------------------------------------
      async function loadSection(id) {
        state.section = id; state.onInput = null; mainEl.innerHTML = "";
        if (id === "home") await buildHome();
        else if (id === "livetv") await buildLiveTV();
        else if (id === "apps") await buildApps();
        else if (id === "search") buildSearch();
        else buildSettings();
        // Restart the section entrance animation.
        mainEl.classList.remove("enter"); void mainEl.offsetWidth; mainEl.classList.add("enter");
      }

      const mediaCard = (m) => {
        const card = document.createElement("aurora-card");
        card.setAttribute("title", m.title);
        card.setAttribute("subtitle", `${m.subtitle} · ${m.genre}`);
        card.setAttribute("accent", m.accent);
        if (m.progress > 0) card.setAttribute("progress", m.progress / 100);
        card.innerHTML = `<button slot="actions" data-action="play" aria-label="Play">▶</button>
                          <button slot="actions" data-action="info" aria-label="Info">ⓘ</button>`;
        card.addEventListener("au-select", () => openDetail(m));
        return card;
      };

      async function buildHome() {
        const data = await api("/api/home");
        const rows = data?.rows ?? [];
        state.rows = [];
        for (const row of rows) {
          const h = document.createElement("h2"); h.textContent = row.title; mainEl.appendChild(h);
          const rd = document.createElement("div"); rd.className = "row";
          const els = (row.items ?? []).map((m) => { const c = mediaCard(m); rd.appendChild(c); return c; });
          mainEl.appendChild(rd);
          if (els.length) state.rows.push(els);
        }
        state.onEnter = () => {}; // cards handle their own au-select
      }

      async function buildApps() {
        const data = await api("/api/apps");
        const apps = data?.apps ?? [];
        const h = document.createElement("h2"); h.textContent = "Apps"; mainEl.appendChild(h);
        const grid = document.createElement("div"); grid.className = "grid";
        const tiles = apps.map((a) => {
          const t = document.createElement("div"); t.className = "tile"; t.tabIndex = 0;
          t.innerHTML = `<span class="glyph" style="background:${a.accent}">${a.glyph}</span>
                         <span class="name">${a.name}</span>`;
          t.dataset.app = a.name;
          t._enter = () => launch(a.name);
          t.addEventListener("click", () => launch(a.name));
          grid.appendChild(t); return t;
        });
        mainEl.appendChild(grid);
        state.rows = chunk(tiles, COLS);
      }

      async function buildLiveTV() {
        const [inp, chs, rec] = await Promise.all([
          api("/api/inputs"), api("/api/channels"), api("/api/recordings"),
        ]);
        const inputs = inp?.inputs ?? [], channels = chs?.channels ?? [];
        const records = rec?.recordings ?? [];
        state.rows = [];

        const ih = document.createElement("h2"); ih.textContent = "Inputs"; mainEl.appendChild(ih);
        const irow = document.createElement("div"); irow.className = "row";
        const inputEls = inputs.map((i) => {
          const t = document.createElement("div"); t.className = "tile input"; t.tabIndex = 0;
          t.innerHTML = `<span class="glyph" style="background:var(--au-surface-2)">${kindGlyph(i.kind)}</span>
                         <span class="name">${i.name}</span>`;
          t._enter = () => switchInput(i.name);
          t.addEventListener("click", () => switchInput(i.name));
          irow.appendChild(t); return t;
        });
        mainEl.appendChild(irow);
        if (inputEls.length) state.rows.push(inputEls);

        const ch = document.createElement("h2"); ch.textContent = "Channel Guide"; mainEl.appendChild(ch);
        const guide = document.createElement("div"); guide.className = "guide";
        const chEls = channels.map((c) => {
          const card = document.createElement("div"); card.className = "chcard"; card.tabIndex = 0;
          card.style.setProperty("--ac", c.accent);
          card.innerHTML = `
            <div class="chhead"><span class="num">${c.number}</span><span class="src">${c.source}</span></div>
            <div class="chname">${c.name}</div>
            <div class="chnow"><b>Now</b>${c.now}</div>
            <div class="chnext"><b>Next</b>${c.next}</div>`;
          card._enter = () => openChannel(c);
          card.addEventListener("click", () => openChannel(c));
          guide.appendChild(card); return card;
        });
        mainEl.appendChild(guide);
        state.rows.push(...chunk(chEls, 3));

        if (records.length) {
          const rh = document.createElement("h2"); rh.textContent = "Recordings (DVR)"; mainEl.appendChild(rh);
          const rrow = document.createElement("div"); rrow.className = "row";
          const recEls = records.map((r) => {
            const card = document.createElement("div"); card.className = "chcard reccard"; card.tabIndex = 0;
            card.style.setProperty("--ac", r.accent);
            card.innerHTML = `
              <div class="chhead"><span class="num">${r.channel}</span>${recBadge(r.status)}</div>
              <div class="chname">${r.title}</div>
              <div class="recmeta">${r.when} · ${r.duration}</div>`;
            card._enter = () => openRecording(r);
            card.addEventListener("click", () => openRecording(r));
            rrow.appendChild(card); return card;
          });
          mainEl.appendChild(rrow);
          state.rows.push(recEls);
        }
      }
      const recBadge = (s) => {
        const cls = s === "Recording" ? "rec" : s === "Recorded" ? "recorded" : "scheduled";
        return `<span class="badge ${cls}"><span class="dot"></span>${s}</span>`;
      };
      function openRecording(r) {
        const playable = r.status === "Recorded";
        sheetEl.innerHTML = `
          <h3>${r.title}</h3>
          <div class="meta">Ch ${r.channel} · ${r.when} · ${r.duration} ${recBadge(r.status)}</div>
          <div class="btns">
            ${playable ? `<button class="play" data-x="play">▶ Play</button>` : ""}
            ${r.status === "Recording" ? `<button data-x="stop">■ Stop</button>` : ""}
            ${r.status === "Scheduled" ? `<button data-x="cancel">✕ Cancel</button>` : ""}
            <button data-x="close">Close</button></div>`;
        openSheet((x) => {
          if (x === "play") setStatus(`▶ <b>Playing recording:</b> ${r.title}`);
          else if (x === "stop") setStatus(`■ <b>Stopped recording:</b> ${r.title}`);
          else if (x === "cancel") setStatus(`✕ <b>Cancelled:</b> ${r.title}`);
        });
        setStatus(`Opened recording <b>${r.title}</b>`);
      }
      const switchInput = (name) => name && setStatus(`Switching input → <b>${name}</b>`);
      const kindGlyph = (k) =>
        ({ Tuner: "📡", HDMI: "⊞", Component: "🎛", VGA: "🖥", Composite: "◉" }[k] || "◉");
      function openChannel(c) {
        sheetEl.innerHTML = `
          <h3>${c.number} · ${c.name}</h3>
          <div class="meta">${c.category} · ${c.source}</div>
          <div class="chnow" style="font-size:15px"><b>Now</b>${c.now}</div>
          <div class="chnext" style="font-size:15px;margin-bottom:18px"><b>Next</b>${c.next}</div>
          <div class="btns">
            <button class="play" data-x="watch">▶ Watch Live</button>
            <button data-x="record">● Record</button>
            <button data-x="close">Close</button></div>`;
        openSheet((x) => {
          if (x === "watch") setStatus(`📺 <b>Tuned to ${c.number}</b> ${c.name} — ${c.now}`);
          else if (x === "record") setStatus(`● <b>Recording:</b> ${c.now} on ${c.name}`);
        });
        setStatus(`Opened <b>${c.name}</b>`);
      }

      function buildSearch() {
        const input = document.createElement("input");
        input.className = "search-box"; input.placeholder = "Search apps, movies, shows…";
        input.setAttribute("aria-label", "Search");
        const note = document.createElement("p"); note.className = "muted"; note.textContent = "Type to search the catalog.";
        const results = document.createElement("div"); results.className = "grid";
        mainEl.append(input, note, results);

        let timer = null;
        const run = async () => {
          const q = input.value.trim();
          if (!q) { results.innerHTML = ""; note.textContent = "Type to search the catalog."; rebuildSearchRows(input, []); return; }
          const data = await api("/api/search?q=" + encodeURIComponent(q));
          const hits = data?.results ?? [];
          note.textContent = `${hits.length} result${hits.length === 1 ? "" : "s"} for “${q}”`;
          results.innerHTML = "";
          const els = hits.map((it) => it.type === "app"
            ? appResultTile(it, results) : (() => { const c = mediaCard(it); results.appendChild(c); return c; })());
          rebuildSearchRows(input, chunk(els, COLS));
        };
        input.addEventListener("input", () => { clearTimeout(timer); timer = setTimeout(run, 160); });
        input._enter = () => navContent("down"); // Enter → jump to first result
        state.onInput = input;
        state.rows = [[input]];
      }
      function appResultTile(a, container) {
        const t = document.createElement("div"); t.className = "tile"; t.tabIndex = 0;
        t.innerHTML = `<span class="glyph" style="background:${a.accent}">${a.glyph}</span><span class="name">${a.name}</span>`;
        t._enter = () => launch(a.name);
        t.addEventListener("click", () => launch(a.name));
        container.appendChild(t); return t;
      }
      function rebuildSearchRows(input, resultRows) {
        state.rows = [[input], ...resultRows];
      }

      // Apply a Settings toggle to the live theme. Theme + Accent + Reduced Motion
      // all flow through CSS custom properties on <html>, so the whole UI re-themes.
      const ACCENTS = { Blue: "#3A7AFE", Purple: "#5C6BC0", Green: "#34C759", Orange: "#F4B400" };
      function applySetting(name, val) {
        const root = document.documentElement;
        if (name === "Theme") root.setAttribute("data-au-theme", val.toLowerCase());
        else if (name === "Accent") {
          const c = ACCENTS[val];
          if (c) { root.style.setProperty("--au-primary", c); root.style.setProperty("--au-accent", c); }
        } else if (name === "Reduced Motion") {
          root.setAttribute("data-au-motion", val === "On" ? "reduced" : "auto");
        }
      }

      function buildSettings() {
        const h = document.createElement("h2"); h.textContent = "Settings"; mainEl.appendChild(h);
        const chips = document.createElement("div"); chips.className = "chips"; mainEl.appendChild(chips);
        api("/api/specs").then((s) => {
          if (!s) return;
          const items = [["RAM", `≤ ${s.total_ram_mb_max} MB`], ["CPU idle", `< ${s.cpu_idle_pct_max}%`],
            ["Boot", `< ${s.boot_s_max}s`], ["Launcher", `< ${s.launcher_start_ms_max}ms`],
            ["Animation", `${s.animation_fps} FPS`], ["Image", `< ${s.system_image_gb_max} GB`]];
          chips.innerHTML = items.map(([k, v]) => `<span class="chip">${k} ${v}</span>`).join("");
        });
        const toggles = [
          { name: "Theme", vals: ["Dark", "Light"] },
          { name: "Accent", vals: ["Blue", "Purple", "Green", "Orange"] },
          { name: "Power Mode", vals: ["Balanced", "Performance", "Battery Saver"] },
          { name: "Reduced Motion", vals: ["Off", "On"] },
        ];
        const rowEls = toggles.map((t) => {
          let i = 0;
          const el = document.createElement("div"); el.className = "setrow"; el.tabIndex = 0;
          const render = () => el.innerHTML = `<span>${t.name}</span><span class="val">${t.vals[i]}</span>`;
          render();
          el._cycle = () => { i = (i + 1) % t.vals.length; render(); applySetting(t.name, t.vals[i]);
            setStatus(`<b>${t.name}</b> → ${t.vals[i]}`); };
          el._enter = el._cycle;
          el.addEventListener("click", () => el._cycle());
          mainEl.appendChild(el); return el;
        });
        state.rows = rowEls.map((e) => [e]);
      }

      const chunk = (arr, n) => { const o = []; for (let i = 0; i < arr.length; i += n) o.push(arr.slice(i, i + n)); return o; };

      // --- focus + navigation ---------------------------------------------
      function cellAt(f) { return state.rows[f.r]?.[f.c] || null; }
      function applyFocus() {
        if (state.zone === "tabs") { tabEls[state.tab].focus(); return; }
        const el = cellAt(state.focus);
        if (el) { el.focus(); el.scrollIntoView({ block: "nearest", inline: "center", behavior: "smooth" }); }
      }
      function clampCol(r, want) {
        const len = state.rows[r]?.length ?? 0;
        return len ? Math.min(want, len - 1) : 0;
      }
      function navContent(dir) {
        const f = state.focus;
        if (dir === "left") { if (f.c > 0) { f.c--; state.desiredCol = f.c; } }
        else if (dir === "right") { const max = (state.rows[f.r]?.length ?? 1) - 1; if (f.c < max) { f.c++; state.desiredCol = f.c; } }
        else if (dir === "up") {
          if (f.r > 0) { f.r--; f.c = clampCol(f.r, state.desiredCol); }
          else { state.zone = "tabs"; applyFocus(); return; }
        } else if (dir === "down") {
          if (f.r < state.rows.length - 1) { f.r++; f.c = clampCol(f.r, state.desiredCol); }
        }
        applyFocus();
      }
      function navTabs(dir) {
        if (dir === "left" && state.tab > 0) selectTab(state.tab - 1, false);
        else if (dir === "right" && state.tab < SECTIONS.length - 1) selectTab(state.tab + 1, false);
        else if (dir === "down") { state.zone = "content"; state.focus = { r: 0, c: 0 }; state.desiredCol = 0; applyFocus(); }
        if (dir === "left" || dir === "right") applyFocus();
      }

      // --- overlay / actions ----------------------------------------------
      function openDetail(m) {
        sheetEl.innerHTML = `
          <h3>${m.title}</h3>
          <div class="meta">${m.subtitle} · ${m.genre}${m.progress > 0 ? " · " + m.progress + "% watched" : ""}</div>
          <div class="bar"><i style="width:${m.progress || 0}%"></i></div>
          <div class="btns">
            <button class="play" data-x="play">▶ ${m.progress > 0 ? "Resume" : "Play"}</button>
            <button data-x="close">Close</button>
          </div>`;
        openSheet((x) => { if (x === "play") setStatus(`▶ <b>Playing:</b> ${m.title}`); });
        setStatus(`Opened <b>${m.title}</b>`);
      }
      // Wire an open sheet: show it, focus the first button, cycle with ←/→,
      // and route a clicked button's data-x to `onAction` (then close). "close" just closes.
      function openSheet(onAction) {
        overlayEl.classList.add("open");
        const btns = [...sheetEl.querySelectorAll("button")];
        if (btns.length) btns[0].focus();
        sheetEl.onkeydown = (e) => {
          if (e.key === "ArrowLeft" || e.key === "ArrowRight") { e.preventDefault();
            btns[(btns.indexOf(document.activeElement) + 1) % btns.length].focus(); }
        };
        btns.forEach((b) => b.addEventListener("click", () => {
          if (b.dataset.x !== "close" && onAction) onAction(b.dataset.x);
          closeOverlay();
        }));
      }
      function closeOverlay() { overlayEl.classList.remove("open"); sheetEl.onkeydown = null; applyFocus(); }
      const launch = (name) => name && setStatus(`Launching <b>${name}</b>…`);

      // --- global keys -----------------------------------------------------
      const DIRS = { ArrowLeft: "left", ArrowRight: "right", ArrowUp: "up", ArrowDown: "down" };
      window.addEventListener("keydown", (e) => {
        if (overlayEl.classList.contains("open")) {
          if (e.key === "Escape" || e.key === "Backspace") { e.preventDefault(); closeOverlay(); }
          return;
        }
        const typingInSearch = state.onInput && document.activeElement === state.onInput;
        const dir = DIRS[e.key];
        if (dir) {
          // Let Left/Right edit text when the search box is focused and non-empty caret-wise.
          if (typingInSearch && (dir === "left" || dir === "right")) return;
          e.preventDefault();
          if (state.zone === "tabs") navTabs(dir); else navContent(dir);
          return;
        }
        if (e.key === "Enter") {
          e.preventDefault();
          if (state.zone === "tabs") { state.zone = "content"; state.focus = { r: 0, c: 0 }; applyFocus(); return; }
          const el = cellAt(state.focus);
          if (el && el.tagName === "AURORA-CARD") el.dispatchEvent(new KeyboardEvent("keydown", { key: "Enter" }));
          else if (el && el._enter) el._enter();
        }
      });

      // --- clock -----------------------------------------------------------
      const tick = () => { const d = new Date();
        $("#clock").textContent = d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }); };
      tick(); setInterval(tick, 10000);

      // --- boot ------------------------------------------------------------
      paintTabs();
      selectTab(0, true);
    </script>
  </body>
</html>
